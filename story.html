<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Deutsch With Anes - Story Detail</title>
    <link rel="stylesheet" href="css/styles.css">


</head>

<body>
    <nav class="navbar">
        <a href="index.html" class="brand-logo">Learn Deutsch With Anes</a>
        <div class="nav-links">
            <!-- PDF button removed -->
        </div>
    </nav>

    <main class="fade-in">
        <div id="story-header" class="story-header">
            <!-- Injected by JS -->
        </div>

        <div id="story-content" class="story-content">
            <!-- Injected by JS -->
        </div>

        <section class="interactive-section" id="quiz-section">
            <h2>Comprehension Check</h2>
            <div id="quiz-container" class="quiz-card">
                <div
                    style="font-family: 'Space Grotesk', sans-serif; font-weight: 600; margin-bottom: 1rem; color: var(--text-secondary);">
                    QUESTION <span id="quiz-current">1</span> OF <span id="quiz-total">3</span>
                </div>
                <h3 id="quiz-question">Loading...</h3>
                <div id="quiz-options" class="quiz-options"></div>

                <div style="margin-top: 1rem; display: flex; justify-content: space-between;">
                    <button class="btn btn-outline" id="quiz-prev" disabled>PREVIOUS</button>
                    <button class="btn" id="quiz-next">NEXT</button>
                </div>
            </div>
        </section>

        <section class="interactive-section" id="vocab-section">
            <h2>Key Vocabulary</h2>
            <div id="vocab-grid" class="vocab-grid">
                <!-- Injected by JS -->
            </div>
        </section>
    </main>

    <!-- Global tooltip element -->
    <div id="tooltip" class="translation-tooltip"></div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
